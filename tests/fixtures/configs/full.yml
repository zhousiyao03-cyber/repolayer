repos:
  - path: ../user_service
  - path: ../order_service
  - path: ../payment_service
  - path: ../bff_sdk
  - path: ../http_idl
    type: idl

links:
  - from: bff_sdk
    to: user_service_api
    kind: http

llm:
  enabled: true
  provider: anthropic
  api_key_env: ANTHROPIC_API_KEY
  summary: true
  query_translation: true
