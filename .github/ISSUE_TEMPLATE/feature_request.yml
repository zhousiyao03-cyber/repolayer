name: Feature request
description: Suggest a capability or improvement for repolayer
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the solution. What are you doing when you hit this?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like repolayer to do? CLI command, MCP tool, new adapter, etc.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools or workarounds you've tried (grep, LSP, ast-grep, ast-outline, ...).
    validations:
      required: false
