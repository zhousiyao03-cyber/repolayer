<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>repolayer · file dependency graph</title>
<style>
  :root { --bg:#0e1116; --panel:#161b22; --border:#30363d; --fg:#c9d1d9; --fg-dim:#8b949e; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
              font-size: 13px; }
  #app { display: grid; grid-template-rows: 48px 1fr; height: 100vh; }
  .toolbar { background: var(--panel); border-bottom: 1px solid var(--border);
             display: flex; align-items: center; gap: 12px; padding: 0 16px; }
  .toolbar select, .toolbar input { background: #0d1117; border: 1px solid var(--border);
                                    color: var(--fg); padding: 4px 8px; border-radius: 4px; outline: none; }
  .toolbar .stats { color: var(--fg-dim); font-size: 11px; margin-left: auto; }
  #cy { background: #0d1117;
        background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 16px 16px; }
  #status { position: absolute; bottom: 12px; left: 12px; background: var(--panel);
            border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px;
            font-size: 11px; color: var(--fg-dim); }
  a { color: #58a6ff; }
</style>
</head>
<body>
<div id="app">
  <header class="toolbar">
    <span><a href="index.html">← back</a></span>
    <label>repo: <select id="repo"></select></label>
    <label>filter: <input id="q" type="search" placeholder="path…"></label>
    <button id="fit">fit</button>
    <button id="relayout">physics layout (slow)</button>
    <span class="stats" id="stats">loading…</span>
  </header>
  <main id="cy">
    <div id="status">loading…</div>
  </main>
</div>
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<script>
(async () => {
  const status = document.getElementById('status');
  const stats = document.getElementById('stats');
  const repoSel = document.getElementById('repo');

  let manifest;
  try { manifest = await fetch('data/deps_manifest.json').then(r => r.json()); }
  catch (e) {
    status.textContent = 'cannot fetch data/deps_manifest.json — open via a local server.';
    return;
  }
  if (!manifest.length) { status.textContent = 'deps.db has no edges'; return; }
  manifest.sort((a, b) => b.edges - a.edges);
  manifest.forEach(m => {
    const o = document.createElement('option'); o.value = m.repo;
    o.textContent = `${m.repo} (${m.files}f · ${m.edges}e)`;
    repoSel.appendChild(o);
  });

  let cy = null;
  async function render(repo) {
    if (cy) { cy.destroy(); cy = null; }
    status.textContent = `fetching deps/${repo}.json…`;
    let els;
    try { els = await fetch(`data/deps/${sanitize(repo)}.json`).then(r => r.json()); }
    catch (e) { status.textContent = `failed: ${e.message || e}`; return; }
    stats.textContent = `${els.nodes.length} files · ${els.edges.length} edges`;
    status.textContent = 'rendering…';
    cy = cytoscape({
      container: document.getElementById('cy'),
      elements: [...els.nodes, ...els.edges],
      minZoom: 0.02, maxZoom: 4,
      textureOnViewport: true,
      hideEdgesOnViewport: true,
      pixelRatio: 1,
      motionBlur: false,
      wheelSensitivity: 0.3,
      style: [
        { selector: 'node',
          style: {
            'label': 'data(label)',
            'color': '#c9d1d9',
            'font-size': 7,
            'min-zoomed-font-size': 12,
            'text-valign': 'center', 'text-halign': 'center',
            'text-outline-color': '#0d1117', 'text-outline-width': 2,
            'background-color': '#58a6ff',
            'width': 6, 'height': 6,
          }},
        { selector: 'edge',
          style: {
            'curve-style': 'bezier',
            'width': 0.6, 'line-color': '#6e7681',
            'target-arrow-color': '#6e7681', 'target-arrow-shape': 'triangle',
            'arrow-scale': 0.5, 'opacity': 0.4,
          }},
        { selector: 'node:selected', style: { 'border-width': 3, 'border-color': '#fff', 'width': 12, 'height': 12 } },
        { selector: '.dim', style: { opacity: 0.06 } },
      ],
      // preset = use server-computed positions; no layout solver runs.
      layout: { name: 'preset', fit: true, padding: 40 },
    });
    cy.ready(() => {
      status.textContent = `${cy.nodes().length} files · ${cy.edges().length} edges · directory-grouped grid · click "physics layout" to refine`;
    });
  }

  repoSel.addEventListener('change', () => render(repoSel.value));
  document.getElementById('fit').addEventListener('click', () => cy && cy.fit(null, 40));
  function sanitize(s) { return s.replace(/[^A-Za-z0-9_-]/g, '_'); }
  document.getElementById('relayout').addEventListener('click', () => {
    if (!cy) return;
    const n = cy.nodes().length;
    if (n > 2000 && !confirm(`run physics layout on ${n} nodes? this can take 30s+ and freeze the tab.`)) return;
    status.textContent = `running fcose on ${n} nodes…`;
    const t0 = performance.now();
    cy.layout({
      name: 'fcose', animate: false, randomize: false,
      nodeRepulsion: 2500, idealEdgeLength: 50, packComponents: true, fit: true,
    }).run();
    status.textContent = `fcose done in ${Math.round(performance.now() - t0)}ms`;
  });
  render(manifest[0].repo);

  document.getElementById('q').addEventListener('input', e => {
    if (!cy) return;
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass('dim'); return; }
    cy.batch(() => {
      cy.elements().addClass('dim');
      const hit = cy.nodes().filter(n => (n.data('path') || '').toLowerCase().includes(q));
      hit.removeClass('dim');
      hit.connectedEdges().removeClass('dim');
      hit.connectedEdges().connectedNodes().removeClass('dim');
    });
  });
})();
</script>
</body>
</html>
